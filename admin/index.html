<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>Elite Admin</title>
  <link rel="icon" href="/assets/logo.png">
  <link rel="stylesheet" href="/admin/admin.css">
  <style>[hidden]{display:none!important}</style>
</head>
<body>
  <section class="login" id="loginView">
    <form class="login-card" id="loginForm">
      <img src="/assets/logo.png" alt="Elite Costa Rica">
      <p class="eyebrow">Centro de mando</p>
      <h1>Elite Admin</h1>
      <p>Gestiona el catálogo desde un solo lugar.</p>
      <label>Contraseña<input id="password" type="password" autocomplete="current-password" required></label>
      <button class="primary" type="submit">Ingresar</button>
      <div class="message" id="loginMessage"></div>
    </form>
  </section>

  <main class="app" id="appView" hidden>
    <aside class="sidebar">
      <div class="brand"><img src="/assets/logo.png" alt=""><span>Elite Admin<small>Inventario</small></span></div>
      <nav><button class="active">Catálogo</button><a href="/catalogo" target="_blank">Ver tienda ↗</a></nav>
      <button class="logout" id="logoutButton">Cerrar sesión</button>
    </aside>

    <section class="workspace">
      <header class="topbar">
        <div><p class="eyebrow">Inventario</p><h1>Perfumes</h1><p id="summary">Cargando registros…</p></div>
        <button class="primary" id="newButton">＋ Nuevo perfume</button>
      </header>
      <section class="toolbar">
        <input id="adminSearch" type="search" placeholder="Buscar por nombre o marca…">
        <select id="categoryFilter"><option value="">Todas las categorías</option><option>Hombre</option><option>Mujer</option><option>Unisex</option><option>Arabes</option><option>Estuches</option></select>
        <select id="statusFilter"><option value="active">Activos</option><option value="deleted">Desactivados</option><option value="all">Todos</option></select>
      </section>
      <div class="inventory" id="inventory"></div>
      <div class="empty" id="emptyState" hidden>No encontramos registros con esos filtros.</div>
    </section>
  </main>

  <dialog id="editorDialog">
    <form id="editorForm">
      <div class="dialog-head"><div><p class="eyebrow">Editor</p><h2 id="editorTitle">Nuevo perfume</h2></div><button type="button" class="icon-button" id="closeEditor">×</button></div>
      <input type="hidden" id="productId">
      <div class="editor-grid">
        <div class="image-editor">
          <div class="preview"><img id="imagePreview" src="/assets/placeholder.webp" alt="Vista previa"></div>
          <label class="upload">Seleccionar imagen<input id="imageFile" type="file" accept="image/png,image/jpeg,image/webp,image/avif"></label>
          <small>PNG, JPG, WEBP o AVIF. Máximo 4 MB.</small>
          <label>URL de imagen<input id="productImage" type="url" required></label>
        </div>
        <div class="fields">
          <label class="full">Nombre<input id="productTitle" maxlength="180" required></label>
          <label>Marca<input id="productBrand" maxlength="100" required></label>
          <label>Categoría<select id="productCategory"><option>Hombre</option><option>Mujer</option><option>Unisex</option><option>Arabes</option><option>Estuches</option></select></label>
          <label>Clasificación<input id="productType" maxlength="80" placeholder="Ej. Hombre, Árabe, Estuche"></label>
          <label class="check"><input id="productImmediate" type="checkbox"> Entrega inmediata</label>
          <label class="full">Descripción<textarea id="productDescription" maxlength="1200" rows="5"></textarea></label>
        </div>
      </div>
      <div class="dialog-actions"><button type="button" class="danger" id="deleteButton">Desactivar</button><span class="message" id="editorMessage"></span><button type="submit" class="primary">Guardar cambios</button></div>
    </form>
  </dialog>
  <script src="/admin/admin.js" defer></script>
</body>
</html>
